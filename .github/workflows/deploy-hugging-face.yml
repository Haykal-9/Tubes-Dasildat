name: Deploy to Hugging Face Space

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hugging-face-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Hugging Face CLI
        run: python -m pip install --upgrade huggingface_hub

      - name: Check deployment token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Add a GitHub Actions secret named HF_TOKEN."
            exit 1
          fi

      - name: Include shared assets in app bundle
        run: cp -R asset fuel_price_predictor/asset

      - name: Upload app to Hugging Face Space
        working-directory: fuel_price_predictor
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload Khaaal/fuel-price-predictor . . \
            --repo-type space \
            --delete "*" \
            --exclude ".gitignore" \
            --exclude "__pycache__/**" \
            --exclude "*.pyc" \
            --exclude ".ipynb_checkpoints/**" \
            --exclude "data/plots/**" \
            --exclude "data/test_data.pkl" \
            --exclude "notebooks/**" \
            --commit-message "Deploy GitHub commit $GITHUB_SHA"
